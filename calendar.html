permalink: /calendar/
---

<div id="intro">
  ˏ 𓏧 𓏲 𓏲 𓏲 𓋒𓏲 𓏲 𓏲 𓏲 𓏧 ˎ<br>
  ‧̍̊˙· 𓆝.° ｡˚𓆛˚｡ °.𓆞 ·˙‧̍̊
</div>

<div class="calendar-page">
  <div class="archive-calendar">
    <a href="/calendar/" class="calendar-header" id="calendar-month"></a>
    <div class="calendar-weekdays">
      <span>S</span>
      <span>M</span>
      <span>T</span>
      <span>W</span>
      <span>T</span>
      <span>F</span>
      <span>S</span>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>
</div>

<script>
  const postsByDate = {
    {% for post in site.posts %}
      "{{ post.date | date: '%Y-%m-%d' }}": {
        url: "{{ post.url }}",
        title: {{ post.title | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  };

  document.addEventListener("DOMContentLoaded", function () {
    const now = new Date().toLocaleString("en-US", {
      timeZone: "Asia/Seoul"
    });
    const today = new Date(now);

    const year = today.getFullYear();
    const month = today.getMonth();
    const date = today.getDate();

    const calendarMonth = document.getElementById("calendar-month");
    const calendarGrid = document.getElementById("calendar-grid");

    if (calendarMonth && calendarGrid) {
      calendarMonth.textContent = `${year}.${month + 1}`;

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "calendar-day empty";
        calendarGrid.appendChild(empty);
      }

      for (let i = 1; i <= lastDate; i++) {
        const dayEl = document.createElement("a");
        dayEl.className = "calendar-day";

        const monthStr = String(month + 1).padStart(2, "0");
        const dayStr = String(i).padStart(2, "0");
        const dateKey = `${year}-${monthStr}-${dayStr}`;

        const dayNumber = document.createElement("span");
        dayNumber.className = "day-number";
        dayNumber.textContent = i;
        dayEl.appendChild(dayNumber);

        if (postsByDate[dateKey]) {
          dayEl.href = postsByDate[dateKey].url;
          dayEl.classList.add("has-post");
          dayEl.title = postsByDate[dateKey].title;
        } else {
          dayEl.href = "/calendar/";
          dayEl.classList.add("no-post");
        }

        if (i === date) {
          dayEl.classList.add("today");
        }

        calendarGrid.appendChild(dayEl);
      }
    }

    setTimeout(() => {
      const intro = document.getElementById("intro");
      if (intro) intro.remove();
    }, 2800);
  });
</script>
