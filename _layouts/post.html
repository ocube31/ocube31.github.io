---
layout: default
---

<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<style>
.post {
  max-width: 560px;
  margin: 120px auto;
  padding: 0 20px;
}

.post-title {
  font-size: 28px;
  font-family: "Cormorant Garamond", serif;
  text-align: center;
  margin-bottom: 10px;
}

.post-date {
  text-align: center;
  font-size: 12px;
  opacity: 0.5;
  margin-bottom: 40px;
}

.post-content {
  font-size: 16px;
  line-height: 1.9;
  color: #2e2e2e;
}

.post-content p {
  margin-bottom: 20px;
}

.post-content img {
  width: 100%;
  margin: 30px 0;
  border-radius: 6px;
}
</style>
